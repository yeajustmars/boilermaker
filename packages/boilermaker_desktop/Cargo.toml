[package]
name = "boilermaker_desktop"
repository = "https://github.com/yeajustmars/boilermaker.git"
version.workspace = true
edition.workspace = true

[dependencies]
boilermaker_core = { workspace = true }
boilermaker_ui = { workspace = true }
color-eyre = { workspace = true }
dioxus = { workspace = true, features = ["router", "fullstack"] }
git2 = { workspace = true }
once_cell = { workspace = true }
openssl = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[features]
default = []
desktop = ["dioxus/desktop"]
server = ["dioxus/server", "boilermaker_ui/server"]
