<h1>Docs Sidenav</h1>

<h2>Tree</h2>

{%- macro render_tree(nodes) -%}
<ul class="pl-4">
  {%- for node in nodes -%}
    <li>
      {%- if node.File -%}
      <a href="/doc/{{ node.File.name }}" class="text-2xl">{{ node.File.name }}</a>
      {%- elif node.Dir %}
        <span class="text-green-400">DIR: /{{ node.Dir.name }}/</span>
        {{ render_tree(node.Dir.children) }}
      {%- endif -%}
    </li>
  {%- endfor -%}
</ul>
{%- endmacro -%}

{{ render_tree(docs_tree) }}
