{% extends "layout.html" %}

{% block title %}Boilermaker Docs | {{title}}{% endblock %}

{% block content %}

<div class="flex flex-col md:flex-row mt-4 gap-8">
  <div class="w-full md:w-auto md:min-w-64 p-2 md:pr-10 border-b border-neutral-200 dark:border-neutral-700 md:border-b-0 md:border-r"
    {% include 'docs_sidenav.html' %}
  </div>
  <div class="doc p-2 w-full md:flex-1">
    {{doc_page|safe}}
  </div>
  <div class="w-full md:w-auto md:min-w-86 p-2">
    <h3 class="text-lg mb-2 text-neutral-400 dark:text-neutral-500">On this Page</h3>
    <ol id="doc-sections" class=""></ol>
  </div>
</div>

<template id="doc-section-template">
  <li><a class="doc-section-link" href="#"></a></li>
</template>

{% endblock %}
