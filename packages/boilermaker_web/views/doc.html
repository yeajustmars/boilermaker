{% extends "layout.html" %}

{% block title %}Boilermaker Docs | {{title}}{% endblock %}

{% block content %}

<div class="grid grid-cols-1 md:grid-cols-4 mt-4 gap-8">

  <div class="md:col-span-1 p-2 md:pr-10 border-b border-neutral-200 dark:border-neutral-700 md:border-b-0 md:border-r">
    {% include 'docs_sidenav.html' %}
  </div>

  <div class="doc p-2 md:col-span-2 w-full overflow-hidden">
    {{doc_page|safe}}
  </div>

  <div class="md:col-span-1 p-2">
    <h3 class="text-lg mb-2 text-neutral-400 dark:text-neutral-500">On this Page</h3>
    <ol id="doc-sections" class=""></ol>
  </div>

</div>

<template id="doc-section-template">
  <li><a class="doc-section-link" href="#"></a></li>
</template>

{% endblock %}
